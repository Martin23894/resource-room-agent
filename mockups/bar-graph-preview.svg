<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" preserveAspectRatio="xMidYMid meet">
  <style>
    .bg-axis    { stroke: #1a1a1a;      stroke-width: 0.7; fill: none; }
    .bg-grid    { stroke: #c8c8c8;     stroke-width: 0.3; stroke-dasharray: 2 2; }
    .bg-tick    { font-family: Inter, sans-serif; font-size: 11px; fill: #4a4a4a; }
    .bg-bar     { fill: #085041; fill-opacity: 0.85; }
    .bg-cat     { font-family: Inter, sans-serif; font-size: 12px; fill: #1a1a1a; }
    .bg-axislab { font-family: Inter, sans-serif; font-size: 12px; fill: #4a4a4a; font-style: italic; }
    .bg-value   { font-family: 'Source Serif 4', Cambria, Georgia, serif; font-size: 12px; font-weight: 600; fill: #1a1a1a; }
  </style>
  <line class="bg-grid" x1="80" y1="270.0" x2="660" y2="270.0"/>
  <line class="bg-grid" x1="80" y1="212.5" x2="660" y2="212.5"/>
  <line class="bg-grid" x1="80" y1="155.0" x2="660" y2="155.0"/>
  <line class="bg-grid" x1="80" y1="97.5" x2="660" y2="97.5"/>
  <line class="bg-grid" x1="80" y1="40.0" x2="660" y2="40.0"/>
  <line class="bg-axis" x1="80" y1="40" x2="80" y2="270"/>
  <line class="bg-axis" x1="80" y1="270" x2="660" y2="270"/>
  <text class="bg-tick" x="72" y="273.0" text-anchor="end">0</text>
  <text class="bg-tick" x="72" y="215.5" text-anchor="end">5</text>
  <text class="bg-tick" x="72" y="158.0" text-anchor="end">10</text>
  <text class="bg-tick" x="72" y="100.5" text-anchor="end">15</text>
  <text class="bg-tick" x="72" y="43.0" text-anchor="end">20</text>
  <rect class="bg-bar" x="108.0" y="178.0" width="60" height="92.0"/>
  <text class="bg-value" x="138.0" y="172.0" text-anchor="middle">8</text>
  <text class="bg-cat"   x="138.0" y="287.0" text-anchor="middle">Apple</text>
  <rect class="bg-bar" x="224.0" y="143.5" width="60" height="126.5"/>
  <text class="bg-value" x="254.0" y="137.5" text-anchor="middle">11</text>
  <text class="bg-cat"   x="254.0" y="287.0" text-anchor="middle">Banana</text>
  <rect class="bg-bar" x="340.0" y="201.0" width="60" height="69.0"/>
  <text class="bg-value" x="370.0" y="195.0" text-anchor="middle">6</text>
  <text class="bg-cat"   x="370.0" y="287.0" text-anchor="middle">Mango</text>
  <rect class="bg-bar" x="456.0" y="224.0" width="60" height="46.0"/>
  <text class="bg-value" x="486.0" y="218.0" text-anchor="middle">4</text>
  <text class="bg-cat"   x="486.0" y="287.0" text-anchor="middle">Orange</text>
  <rect class="bg-bar" x="572.0" y="166.5" width="60" height="103.5"/>
  <text class="bg-value" x="602.0" y="160.5" text-anchor="middle">9</text>
  <text class="bg-cat"   x="602.0" y="287.0" text-anchor="middle">Pear</text>
  <text class="bg-axislab" transform="translate(28,160) rotate(-90)" text-anchor="middle">Number of learners</text>
  <text class="bg-axislab" x="350" y="310" text-anchor="middle">Type of fruit</text>
</svg>
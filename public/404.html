<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page not found — The Resource Room</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--t8:#085041;--t6:#0F6E56;--t4:#1D9E75;--t1:#9FE1CB;--t9:#04342C;--ink:#1a1a18;--ink3:#73726c;--sur:#f8f7f3;}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--sur);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}
.hdr{background:var(--t8);padding:14px 28px;}
.logo{display:flex;flex-direction:column;line-height:1.1;text-decoration:none;}
.l-the{font-size:8px;font-weight:700;letter-spacing:5px;color:var(--t1);}
.l-res{font-size:19px;font-weight:700;color:#fff;letter-spacing:-1px;}
.l-room{font-size:19px;font-weight:700;color:var(--t9);letter-spacing:-1px;background:var(--t4);padding:1px 7px 3px 0;}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:50px 28px;}
.code{font-size:96px;font-weight:800;color:var(--t8);letter-spacing:-3px;line-height:1;}
h1{font-size:24px;color:var(--ink);margin:14px 0 8px;}
p{font-size:15px;color:var(--ink3);max-width:420px;margin:0 auto 24px;line-height:1.55;}
.btn{display:inline-block;padding:12px 22px;background:var(--t8);color:#fff;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;}
.btn:hover{background:var(--t6);}
</style>
<script src="/_/analytics.js" defer></script>
</head>
<body>
<header class="hdr">
  <a href="/" class="logo">
    <div class="l-the">THE</div>
    <div><span class="l-res">RESOURCE</span></div>
    <div><span class="l-room">ROOM</span></div>
  </a>
</header>
<main>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>We couldn't find the page you were looking for. It may have moved, or the link might be wrong.</p>
  <a href="/" class="btn">Back to home</a>
</main>
</body>
</html>
